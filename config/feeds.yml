# RSS/Atom feeds polled by scripts/rss_collector.py as the deterministic
# "floor" sampler (B) of the CCS-news audit pipeline. Curated to match the
# routine's PREFERRED SOURCES tiers.
#
# Each entry:
#   name:          Human-readable label (appears in audit reports)
#   url:           RSS or Atom feed URL
#   source_domain: Canonical domain string (matches scripts/_canon.source_domain)
#   tier:          1 | 2 | 2b | 3 | 4 | 5  (mirrors routine prompt)
#   region:        au | apac | na | eu_uk | mena | row | global
#   ccs_filter:    "always" — keep every item (sources that are CCS-only)
#                  "regex"  — apply CCS_KEYWORD_RE before keeping
#
# Verify a feed exists before adding: `curl -sI <url> | head -1` should return
# 200. Some publishers move their feed paths — review quarterly.

feeds:
  # ------------------------------------------------------------------- Tier 1
  - name: Carbon Herald
    url: https://carbonherald.com/feed/
    source_domain: carbonherald.com
    tier: 1
    region: global
    ccs_filter: always

  - name: Reuters — Sustainability
    url: https://www.reutersagency.com/feed/?best-topics=sustainability
    source_domain: reuters.com
    tier: 1
    region: global
    ccs_filter: regex

  - name: Bloomberg Green
