# RSS/Atom feeds polled by scripts/rss_collector.py as the deterministic
# "floor" sampler (B) of the CCS-news audit pipeline.
#
# Two feed types in use:
#   * Direct publisher RSS where it exists and works (Carbon Herald, Bloomberg,
#     Phys.org, TechXplore, Renew Economy, ABC, AFR, Guardian, ESDnews).
#   * Google News RSS site-search queries for publishers that retired or
#     paywalled their feeds. URL pattern:
#        https://news.google.com/rss/search?q=site:<domain>+(<phrases>)&hl=...
#     Google News entries link to news.google.com redirects; the collector
#     uses entry.source.href to populate source_domain correctly.
#
# Query convention for Google News buckets: use phrase matches ("carbon
# capture", "carbon storage", "carbon capture and storage") plus the
# unambiguous tokens CCUS / DAC. The bare token CCS is too ambiguous (matches
# stock tickers, court-case codes, etc) — avoid it unless prefixed.
#
# Verify quarterly. If a publisher restores a real RSS feed, replace the
# Google News bucket; direct feeds are higher signal.

feeds:
  # ------------------------------------------------------------------- Tier 1
  - name: Carbon Herald
    url: https://carbonherald.com/feed/
    source_domain: carbonherald.com
    tier: 1
    region: global
    ccs_filter: always

  - name: Reuters (Google News)
    url: https://news.google.com/rss/search?q=site:reuters.com+(%22carbon+capture%22+OR+CCUS+OR+%22carbon+storage%22)&hl=en-AU&gl=AU&ceid=AU:en
    source_domain: reuters.com
    tier: 1
    region: global
    ccs_filter: regex

  - name: Bloomberg Green
    url: https://feeds.bloomberg.com/green/news.rss
    source_domain: bloomberg.com
    tier: 1
    region: global
    ccs_filter: regex

  - name: Offshore Energy (Google News)
    url: https://news.google.com/rss/search?q=site:offshore-energy.biz+(%22carbon+capture%22+OR+CCUS)&hl=en&gl=US&ceid=US:en
    source_domain: offshore-energy.biz
    tier: 1
