name: RSS floor collector (sampler B)

on:
  # 07:00 Melbourne AEST = 21:00 UTC the previous day.
  # Swap to '0 20 * * 0-4' during AEDT (Oct–Apr) — see README.
  schedule:
    - cron: '0 21 * * 0-4'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser PyYAML

      - name: Run RSS collector
        env:
          PYTHONUNBUFFERED: '1'
        run: python3 scripts/rss_collector.py

      - name: Commit audit artefacts
        run: |
          set -euo pipefail
          git config user.email 'ccs-news-routine@co2crc.com.au'
          git config user.name  'CCS RSS Floor'
          git add audit/candidates.db audit/*-rss.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No audit changes to commit."
            exit 0
          fi
          git commit -m "RSS floor $(TZ=Australia/Melbourne date +%Y-%m-%d)"
          # Rebase-pull to avoid stepping on the briefing routine's push.
          git pull --rebase --autostash
          git push origin main
